services:
  - type: web
    name: douyinlm-live
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./live/Dockerfile
    dockerContext: ./live
    autoDeployTrigger: off
    healthCheckPath: /api/health/ready
    disk:
      name: douyinlm-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_MODE
        value: stage
      - key: DATA_DIR
        value: /var/data
      - key: WEB_DIST_DIR
        value: /app/apps/web/dist
      - key: ARK_API_KEY
        sync: false
      - key: VOLC_ASR_API_KEY
        sync: false
      - key: VOLC_ASR_APP_ID
        sync: false
      - key: VOLC_ASR_ACCESS_TOKEN
        sync: false
      - key: VOLC_ASR_RESOURCE_ID
        value: volc.bigasr.auc_turbo
      - key: WEB_SEARCH_ENABLED
        value: "false"
